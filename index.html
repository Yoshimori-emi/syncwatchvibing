<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncWatch — Watch Together</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --surface: #0e1219;
    --surface2: #141820;
    --border: #1e2530;
    --accent: #e8453c;
    --accent2: #ff7b54;
    --gold: #f5c842;
    --text: #e8eaf0;
    --muted: #5a6478;
    --online: #3ecf7e;
    --sync-glow: rgba(232, 69, 60, 0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,11,16,0.95);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span { color: var(--text); -webkit-text-fill-color: var(--text); }

  .room-info {
    display: flex; align-items: center; gap: 20px;
    font-size: 13px; color: var(--muted);
  }

  .viewers {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2);
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--online);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--online);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .room-id-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 20px;
    cursor: pointer; transition: border-color 0.2s;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .room-id-badge:hover { border-color: var(--accent); }

  /* ── MAIN LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    min-height: calc(100vh - 65px);
  }

  /* ── LEFT PANEL ── */
  .main-panel { border-right: 1px solid var(--border); }

  /* ── VIDEO AREA ── */
  .video-wrap {
    position: relative;
    background: #000;
    aspect-ratio: 16/9;
    overflow: hidden;
  }

  video {
    width: 100%; height: 100%;
    display: block;
    object-fit: contain;
  }

  .no-video {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: radial-gradient(ellipse at center, #111820 0%, #080b10 100%);
  }

  .no-video-icon {
    font-size: 64px; opacity: 0.2;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .no-video p {
    font-size: 14px; color: var(--muted); letter-spacing: 0.5px;
  }

  /* ── SYNC FLASH ── */
  .sync-flash {
    position: absolute; inset: 0;
    background: rgba(232, 69, 60, 0.15);
    border: 2px solid var(--accent);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 2px;
  }
  .sync-flash.active { opacity: 1; }

  /* ── CONTROLS BAR ── */
  .controls-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(232,69,60,0.35);
  }
  .btn-primary:hover {
    background: #ff5248;
    box-shadow: 0 6px 24px rgba(232,69,60,0.55);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,69,60,0.07);
  }

  .btn-sync {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 20px var(--sync-glow);
    padding: 10px 22px;
    font-size: 13px;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }
  .btn-sync::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .btn-sync:hover::before { opacity: 1; }
  .btn-sync:hover { box-shadow: 0 6px 30px var(--sync-glow); transform: translateY(-1px); }
  .btn-sync.syncing {
    animation: syncPulse 0.8s ease-in-out 3;
  }
  @keyframes syncPulse {
    0%, 100% { box-shadow: 0 4px 20px var(--sync-glow); }
    50% { box-shadow: 0 0 40px rgba(232,69,60,0.9), 0 0 80px rgba(232,69,60,0.4); }
  }

  .upload-label {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    background: var(--surface2);
    color: var(--text);
    border: 1px dashed var(--border);
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .upload-label:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(245,200,66,0.05);
  }
  input[type="file"] { display: none; }

  .url-input-wrap {
    display: flex; align-items: center; gap: 8px;
    flex: 1; min-width: 200px;
  }
  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input::placeholder { color: var(--muted); }
  .url-input:focus { border-color: var(--accent); }

  .sync-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
    margin-left: auto;
  }
  .sync-status .dot-status {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .sync-status.synced .dot-status { background: var(--online); box-shadow: 0 0 6px var(--online); }
  .sync-status.synced { color: var(--online); }

  /* ── NOW PLAYING ── */
  .now-playing {
    padding: 20px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .now-playing-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent); font-weight: 600; margin-bottom: 6px;
  }
  .now-playing-title {
    font-size: 20px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .now-playing-meta {
    font-size: 12px; color: var(--muted); margin-top: 4px;
    display: flex; gap: 16px;
  }

  /* ── RIGHT PANEL ── */
  .side-panel {
    display: flex; flex-direction: column;
    background: var(--surface);
  }

  .panel-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 2px;
    color: var(--text);
  }

  .badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
  }

  /* ── EPISODE LIST ── */
  .episode-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .episode-list::-webkit-scrollbar { width: 4px; }
  .episode-list::-webkit-scrollbar-track { background: transparent; }
  .episode-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .episode-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s;
    border: 1px solid transparent;
    margin-bottom: 4px;
    position: relative;
    overflow: hidden;
  }

  .episode-item::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
    opacity: 0; transition: opacity 0.2s;
    border-radius: 0 2px 2px 0;
  }

  .episode-item:hover {
    background: var(--surface2);
    border-color: var(--border);
  }
  .episode-item:hover::before { opacity: 0.5; }

  .episode-item.active {
    background: rgba(232,69,60,0.09);
    border-color: rgba(232,69,60,0.3);
  }
  .episode-item.active::before { opacity: 1; }

  .ep-thumb {
    width: 72px; height: 42px;
    border-radius: 6px;
    background: var(--bg);
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    border: 1px solid var(--border);
    position: relative;
  }

  .ep-thumb video {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .ep-play-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
    font-size: 16px;
  }
  .episode-item:hover .ep-play-overlay { opacity: 1; }

  .ep-info { flex: 1; min-width: 0; }
  .ep-num {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px;
  }
  .ep-title {
    font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .ep-dur {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }

  .ep-remove {
    opacity: 0; background: none; border: none;
    color: var(--muted); cursor: pointer;
    padding: 4px; border-radius: 4px;
    transition: all 0.2s; font-size: 14px;
  }
  .episode-item:hover .ep-remove {
    opacity: 1;
  }
  .ep-remove:hover { color: var(--accent); background: rgba(232,69,60,0.1); }

  .empty-list {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px;
  }
  .empty-list .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  /* ── SEPARATOR ── */
  .panel-sep {
    height: 1px; background: var(--border); margin: 0 12px;
  }

  /* ── CHAT AREA ── */
  .chat-section { display: flex; flex-direction: column; height: 280px; }

  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-msg {
    display: flex; gap: 8px; align-items: flex-start;
    animation: msgIn 0.2s ease-out;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    margin-top: 1px;
  }

  .chat-bubble {
    background: var(--surface2);
    border-radius: 0 10px 10px 10px;
    padding: 7px 12px;
    font-size: 12px; line-height: 1.5;
    border: 1px solid var(--border);
  }

  .chat-bubble .name {
    font-size: 10px; font-weight: 600; margin-bottom: 2px;
    letter-spacing: 0.3px;
  }

  .chat-bubble.system {
    background: rgba(232,69,60,0.08);
    border-color: rgba(232,69,60,0.2);
    color: var(--accent);
    font-size: 11px;
    border-radius: 8px;
    text-align: center;
    width: 100%;
  }

  .chat-input-row {
    display: flex; gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
  }

  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; outline: none;
    transition: border-color 0.2s;
  }
  .chat-input::placeholder { color: var(--muted); }
  .chat-input:focus { border-color: var(--accent); }

  .chat-send {
    background: var(--accent); border: none; color: #fff;
    padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-size: 14px;
    transition: background 0.2s;
  }
  .chat-send:hover { background: #ff5248; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
  .toast.success { border-color: var(--online); color: var(--online); }
  .toast.sync { border-color: var(--accent); color: var(--accent); }

  /* ── PROGRESS BAR ── */
  .progress-container {
    padding: 0 24px 16px;
    background: var(--surface);
  }
  .progress-bar-wrap {
    height: 4px; background: var(--border);
    border-radius: 2px; cursor: pointer; position: relative;
    transition: height 0.2s;
  }
  .progress-bar-wrap:hover { height: 6px; }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s linear;
    pointer-events: none;
  }
  .progress-time {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted); margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }

  /* ── VOLUME ── */
  .volume-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto;
  }
  input[type="range"].vol-slider {
    -webkit-appearance: none;
    width: 80px; height: 3px;
    background: var(--border); border-radius: 2px; outline: none;
    cursor: pointer;
  }
  input[type="range"].vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent); border-radius: 50%;
    cursor: pointer;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .side-panel { border-top: 1px solid var(--border); border-right: none; }
  }

  /* ── SECTION TABS ── */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
  }
  .tab {
    padding: 12px 16px;
    font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    font-weight: 600; cursor: pointer;
    color: var(--muted); border-bottom: 2px solid transparent;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: flex; flex-direction: column; flex: 1; }

  .side-panel { overflow: hidden; }
  .side-panel-inner { display: flex; flex-direction: column; flex: 1; overflow: hidden; height: calc(100vh - 65px); }

  /* ── ADD VIDEO URL PANEL ── */
  .add-url-panel {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }
  .add-url-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; outline: none;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }
  .add-url-input::placeholder { color: var(--muted); }
  .add-url-input:focus { border-color: var(--accent); }

  .ep-name-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; outline: none;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }
  .ep-name-input::placeholder { color: var(--muted); }
  .ep-name-input:focus { border-color: var(--accent); }

  .btn-sm {
    padding: 7px 14px; font-size: 12px; border-radius: 7px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Sync<span>Watch</span></div>
  <div class="room-info">
    <div class="viewers">
      <div class="dot"></div>
      <span id="viewerCount">1 watching</span>
    </div>
    <div class="room-id-badge" onclick="copyRoomId()" title="Click to copy room ID">
      🔗 ROOM: <span id="roomId"></span>
    </div>
  </div>
</header>

<div class="app">
  <!-- LEFT: VIDEO + CONTROLS -->
  <div class="main-panel">
    <div class="video-wrap" id="videoWrap">
      <video id="mainVideo" controls></video>
      <div class="no-video" id="noVideo">
        <div class="no-video-icon">🎬</div>
        <p>Upload a video or add a URL to begin</p>
      </div>
      <div class="sync-flash" id="syncFlash"></div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-container">
      <div class="progress-bar-wrap" id="progressWrap" onclick="seekFromProgress(event)">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-time">
        <span id="currentTime">0:00</span>
        <div class="volume-wrap">
          <span style="font-size:13px">🔊</span>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
        </div>
        <span id="totalTime">0:00</span>
      </div>
    </div>

    <!-- CONTROLS BAR -->
    <div class="controls-bar">
      <label class="upload-label">
        ⬆ Upload Video
        <input type="file" id="fileInput" accept="video/*" onchange="handleFileUpload(event)">
      </label>

      <div class="url-input-wrap">
        <input class="url-input" id="urlInput" type="text" placeholder="Paste direct video URL (mp4, webm…)">
        <button class="btn btn-secondary btn-sm" onclick="loadFromURL()">Load</button>
      </div>

      <button class="btn btn-sync" id="syncBtn" onclick="syncAll()">
        ⟳ SYNC ALL
      </button>

      <div class="sync-status" id="syncStatus">
        <div class="dot-status"></div>
        <span>Not synced</span>
      </div>
    </div>

    <!-- NOW PLAYING -->
    <div class="now-playing">
      <div class="now-playing-label">▶ Now Playing</div>
      <div class="now-playing-title" id="nowPlayingTitle">No video selected</div>
      <div class="now-playing-meta">
        <span id="npEpNum">—</span>
        <span id="npSize">—</span>
      </div>
    </div>
  </div>

  <!-- RIGHT: SIDE PANEL -->
  <div class="side-panel">
    <div class="side-panel-inner">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('episodes', this)">Episodes</div>
        <div class="tab" onclick="switchTab('chat', this)">Chat</div>
      </div>

      <!-- EPISODES TAB -->
      <div class="tab-content active" id="tab-episodes">
        <div class="add-url-panel">
          <input class="ep-name-input" id="epNameInput" placeholder="Episode / video title (optional)">
          <label class="upload-label" style="width:100%; justify-content:center; margin-bottom:8px;">
            ＋ Add Video File
            <input type="file" accept="video/*" onchange="addToPlaylist(event, 'file')">
          </label>
        </div>
        <div class="panel-header">
          <div class="panel-title">Playlist</div>
          <div class="badge" id="epCount">0</div>
        </div>
        <div class="episode-list" id="episodeList">
          <div class="empty-list">
            <div class="empty-icon">📂</div>
            <p>No videos yet.<br>Upload files to build your playlist.</p>
          </div>
        </div>
      </div>

      <!-- CHAT TAB -->
      <div class="tab-content" id="tab-chat">
        <div class="chat-section">
          <div class="panel-header">
            <div class="panel-title">Watch Party Chat</div>
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="chat-bubble system">👋 Welcome to the watch party! Sync your video to watch together.</div>
          </div>
          <div class="chat-input-row">
            <input class="chat-input" id="chatInput" placeholder="Say something…" maxlength="200" onkeydown="if(event.key==='Enter') sendChat()">
            <button class="chat-send" onclick="sendChat()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let playlist = [];
let currentIndex = -1;
let userName = 'Viewer_' + Math.floor(Math.random() * 9000 + 1000);
let roomId = generateRoomId();
let channel = null;
let avatarColors = ['#e8453c','#ff7b54','#f5c842','#3ecf7e','#5b8dee','#a855f7'];

document.getElementById('roomId').textContent = roomId;

// ── BROADCAST CHANNEL (multi-tab sync) ──
try {
  channel = new BroadcastChannel('syncwatch_' + roomId);
  channel.onmessage = handleSyncMessage;
} catch(e) {}

// ── ROOM ID ──
function generateRoomId() {
  const stored = localStorage.getItem('sw_room');
  if (stored) return stored;
  const id = Math.random().toString(36).substr(2,6).toUpperCase();
  localStorage.setItem('sw_room', id);
  return id;
}

function copyRoomId() {
  const url = window.location.href.split('?')[0] + '?room=' + roomId;
  navigator.clipboard.writeText(url).catch(()=>{});
  showToast('Room link copied! Share with friends 🔗', 'success');
}

// ── FILE UPLOAD (main player) ──
function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  loadVideo(url, file.name, formatBytes(file.size));
  addEpisodeToList(url, file.name, formatBytes(file.size), true);
}

// ── URL LOAD ──
function loadFromURL() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { showToast('Please enter a video URL'); return; }
  loadVideo(url, url.split('/').pop() || 'Video', 'URL stream');
  addEpisodeToList(url, url.split('/').pop() || 'Video', 'URL stream', true);
  document.getElementById('urlInput').value = '';
}

// ── ADD TO PLAYLIST ONLY ──
function addToPlaylist(e, type) {
  const file = e.target.files[0];
  if (!file) return;
  const customName = document.getElementById('epNameInput').value.trim();
  const url = URL.createObjectURL(file);
  const name = customName || file.name;
  addEpisodeToList(url, name, formatBytes(file.size), false);
  document.getElementById('epNameInput').value = '';
  showToast(`Added: ${name}`, 'success');
}

// ── LOAD VIDEO ──
function loadVideo(url, name, meta, index) {
  const video = document.getElementById('mainVideo');
  const noVideo = document.getElementById('noVideo');
  video.src = url;
  video.load();
  noVideo.style.display = 'none';
  document.getElementById('nowPlayingTitle').textContent = name;
  document.getElementById('npSize').textContent = meta || '';
  document.getElementById('npEpNum').textContent = index !== undefined ? `Episode ${index + 1}` : '—';

  video.ontimeupdate = updateProgress;
  video.onloadedmetadata = () => {
    document.getElementById('totalTime').textContent = formatTime(video.duration);
  };
  video.onplay = () => broadcastState('play');
  video.onpause = () => broadcastState('pause');
}

// ── EPISODE LIST ──
function addEpisodeToList(url, name, meta, playNow) {
  const idx = playlist.length;
  playlist.push({ url, name, meta });
  if (playNow) {
    currentIndex = idx;
    loadVideo(url, name, meta, idx);
  }
  renderPlaylist();
  updateEpCount();
}

function renderPlaylist() {
  const list = document.getElementById('episodeList');
  if (playlist.length === 0) {
    list.innerHTML = `<div class="empty-list"><div class="empty-icon">📂</div><p>No videos yet.<br>Upload files to build your playlist.</p></div>`;
    return;
  }
  list.innerHTML = playlist.map((ep, i) => `
    <div class="episode-item ${i === currentIndex ? 'active' : ''}" onclick="playEpisode(${i})">
      <div class="ep-thumb">
        <video src="${ep.url}" muted preload="metadata" style="width:100%;height:100%;object-fit:cover"></video>
        <div class="ep-play-overlay">▶</div>
      </div>
      <div class="ep-info">
        <div class="ep-num">Episode ${i + 1}</div>
        <div class="ep-title">${escHtml(ep.name)}</div>
        <div class="ep-dur">${ep.meta || ''}</div>
      </div>
      <button class="ep-remove" onclick="removeEpisode(event, ${i})" title="Remove">✕</button>
    </div>
  `).join('');
}

function playEpisode(i) {
  currentIndex = i;
  const ep = playlist[i];
  loadVideo(ep.url, ep.name, ep.meta, i);
  renderPlaylist();
  document.getElementById('mainVideo').play();
  broadcastState('load', { index: i });
}

function removeEpisode(e, i) {
  e.stopPropagation();
  if (i === currentIndex) {
    document.getElementById('mainVideo').src = '';
    document.getElementById('noVideo').style.display = '';
    document.getElementById('nowPlayingTitle').textContent = 'No video selected';
    currentIndex = -1;
  } else if (i < currentIndex) {
    currentIndex--;
  }
  playlist.splice(i, 1);
  renderPlaylist();
  updateEpCount();
  showToast('Episode removed');
}

function updateEpCount() {
  document.getElementById('epCount').textContent = playlist.length;
}

// ── SYNC ──
function syncAll() {
  const video = document.getElementById('mainVideo');
  if (!video.src || video.src === window.location.href) {
    showToast('No video loaded to sync!');
    return;
  }

  const btn = document.getElementById('syncBtn');
  btn.classList.add('syncing');
  setTimeout(() => btn.classList.remove('syncing'), 2500);

  const state = {
    type: 'sync',
    time: video.currentTime,
    playing: !video.paused,
    index: currentIndex,
    ts: Date.now()
  };

  broadcastState('sync', state);

  // Flash border
  const flash = document.getElementById('syncFlash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 600);

  // Mark synced
  const status = document.getElementById('syncStatus');
  status.className = 'sync-status synced';
  status.innerHTML = '<div class="dot-status"></div><span>Synced ✓</span>';
  setTimeout(() => {
    status.className = 'sync-status';
    status.innerHTML = '<div class="dot-status"></div><span>Not synced</span>';
  }, 4000);

  showToast('⟳ Synced to current position!', 'sync');
  addChatSystem(`🔄 ${userName} synced the video at ${formatTime(video.currentTime)}`);
}

function broadcastState(type, extra = {}) {
  if (!channel) return;
  const video = document.getElementById('mainVideo');
  channel.postMessage({
    type,
    user: userName,
    time: video.currentTime,
    playing: !video.paused,
    ...extra
  });
}

function handleSyncMessage(e) {
  const msg = e.data;
  const video = document.getElementById('mainVideo');

  if (msg.type === 'sync') {
    if (Math.abs(video.currentTime - msg.time) > 0.5) {
      video.currentTime = msg.time;
    }
    if (msg.playing && video.paused) video.play();
    if (!msg.playing && !video.paused) video.pause();

    const flash = document.getElementById('syncFlash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 600);

    const status = document.getElementById('syncStatus');
    status.className = 'sync-status synced';
    status.innerHTML = '<div class="dot-status"></div><span>Synced ✓</span>';
    setTimeout(() => {
      status.className = 'sync-status';
      status.innerHTML = '<div class="dot-status"></div><span>Not synced</span>';
    }, 4000);

    showToast(`⟳ ${msg.user} synced the video`, 'sync');
  }

  if (msg.type === 'chat') {
    appendChat(msg.user, msg.text, false);
  }

  if (msg.type === 'load' && msg.index !== undefined && playlist[msg.index]) {
    playEpisode(msg.index);
  }
}

// ── PROGRESS ──
function updateProgress() {
  const video = document.getElementById('mainVideo');
  if (!video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentTime').textContent = formatTime(video.currentTime);
}

function seekFromProgress(e) {
  const video = document.getElementById('mainVideo');
  if (!video.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  video.currentTime = pct * video.duration;
}

function setVolume(v) {
  document.getElementById('mainVideo').volume = v;
}

// ── CHAT ──
function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  appendChat(userName, text, true);
  if (channel) channel.postMessage({ type: 'chat', user: userName, text });
}

function appendChat(user, text, isSelf) {
  const box = document.getElementById('chatMessages');
  const color = avatarColors[hashCode(user) % avatarColors.length];
  const initials = user.slice(0,2).toUpperCase();

  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `
    <div class="chat-avatar" style="background:${color}20;color:${color};border:1px solid ${color}40">${initials}</div>
    <div class="chat-bubble">
      <div class="name" style="color:${color}">${escHtml(user)}${isSelf ? ' (you)' : ''}</div>
      ${escHtml(text)}
    </div>
  `;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addChatSystem(text) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.innerHTML = `<div class="chat-bubble system">${escHtml(text)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ── TABS ──
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── TOAST ──
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 2800);
}

// ── UTILS ──
function formatTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}
function formatBytes(b) {
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// ── VIEWER COUNT SIMULATION ──
function updateViewerCount() {
  try {
    const key = 'sw_viewers_' + roomId;
    const now = Date.now();
    let viewers = JSON.parse(localStorage.getItem(key) || '{}');
    viewers[userName] = now;
    // Remove stale viewers (>10s)
    Object.keys(viewers).forEach(v => { if (now - viewers[v] > 10000) delete viewers[v]; });
    localStorage.setItem(key, JSON.stringify(viewers));
    const count = Object.keys(viewers).length;
    document.getElementById('viewerCount').textContent = count + ' watching';
  } catch(e) {}
}
setInterval(updateViewerCount, 3000);
updateViewerCount();

// ── INIT WELCOME CHAT ──
setTimeout(() => {
  addChatSystem(`You joined as ${userName}`);
}, 300);
</script>
</body>
</html>
